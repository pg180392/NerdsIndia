<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NerdsIndia - Live India Weather</title>
<script>
  // set theme before first paint to avoid a flash of the wrong theme
  (function(){
    try{
      var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
    }catch(e){
      document.documentElement.setAttribute('data-theme', 'light');
    }
  })();
</script>
<link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="bg-blobs">
    <span class="blob b1"></span>
    <span class="blob b2"></span>
    <span class="blob b3"></span>
  </div>

  <div class="page">
    <div id="headerMount"></div>

    <main>
      <div class="grid" id="grid"></div>
      <p class="empty-state hidden" id="emptyState">No state or city matches “<span id="queryEcho"></span>”.</p>
    </main>

    <footer>
      <p>© NerdsIndia 2026</p>
    </footer>
  </div>

<script src="weather-common.js"></script>
<script>
  // ---------- data: one representative city per state ----------
  // Add "page" to a state once its own city-level page exists (e.g. "goa.html")
  // and its card automatically becomes clickable.
  const STATES = [
    { state:"Andhra Pradesh",     city:"Amaravati",     lat:16.5062, lon:80.6480 },
    { state:"Arunachal Pradesh",  city:"Itanagar",      lat:27.0844, lon:93.6053 },
    { state:"Assam",              city:"Guwahati",      lat:26.1445, lon:91.7362 },
    { state:"Bihar",              city:"Patna",         lat:25.5941, lon:85.1376 },
    { state:"Chhattisgarh",       city:"Raipur",        lat:21.2514, lon:81.6296 },
    { state:"Goa",                city:"Panaji",        lat:15.4909, lon:73.8278, page:"goa.html" },
    { state:"Gujarat",            city:"Gandhinagar",   lat:23.2156, lon:72.6369 },
    { state:"Haryana",            city:"Gurugram",      lat:28.4595, lon:77.0266 },
    { state:"Himachal Pradesh",   city:"Shimla",        lat:31.1048, lon:77.1734 },
    { state:"Jharkhand",          city:"Ranchi",        lat:23.3441, lon:85.3096 },
    { state:"Karnataka",          city:"Bengaluru",     lat:12.9716, lon:77.5946 },
    { state:"Kerala",             city:"Thiruvananthapuram", lat:8.5241, lon:76.9366 },
    { state:"Madhya Pradesh",     city:"Bhopal",        lat:23.2599, lon:77.4126 },
    { state:"Maharashtra",        city:"Mumbai",        lat:19.0760, lon:72.8777 },
    { state:"Manipur",            city:"Imphal",        lat:24.8170, lon:93.9368 },
    { state:"Meghalaya",          city:"Shillong",      lat:25.5788, lon:91.8933 },
    { state:"Mizoram",            city:"Aizawl",        lat:23.7271, lon:92.7176 },
    { state:"Nagaland",           city:"Kohima",        lat:25.6751, lon:94.1086 },
    { state:"Odisha",             city:"Bhubaneswar",   lat:20.2961, lon:85.8245 },
    { state:"Punjab",             city:"Chandigarh",    lat:30.7333, lon:76.7794 },
    { state:"Rajasthan",          city:"Jaipur",        lat:26.9124, lon:75.7873 },
    { state:"Sikkim",             city:"Gangtok",       lat:27.3389, lon:88.6065 },
    { state:"Tamil Nadu",         city:"Chennai",       lat:13.0827, lon:80.2707 },
    { state:"Telangana",          city:"Hyderabad",     lat:17.3850, lon:78.4867 },
    { state:"Tripura",            city:"Agartala",      lat:23.8315, lon:91.2868 },
    { state:"Uttar Pradesh",      city:"Lucknow",       lat:26.8467, lon:80.9462 },
    { state:"Uttarakhand",        city:"Dehradun",      lat:30.3165, lon:78.0322 },
    { state:"West Bengal",        city:"Kolkata",       lat:22.5726, lon:88.3639 },
    { state:"Delhi (NCT)",        city:"New Delhi",     lat:28.6139, lon:77.2090 }
  ];

  const grid = document.getElementById('grid');
  const emptyState = document.getElementById('emptyState');
  const queryEcho = document.getElementById('queryEcho');

  (async function(){
    const { searchInput, refreshBtn, updatedAt } = await niInitHeader(
      () => niLoadWeather(STATES, updatedAt, refreshBtn)
    );
    niWireSearch(grid, emptyState, queryEcho, searchInput);
    niBuildCards(grid, STATES, { mode:'state' });
    niLoadWeather(STATES, updatedAt, refreshBtn);
  })();
</script>
</body>
</html>
