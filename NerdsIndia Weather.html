<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NerdsIndia - Live India Weather</title>
<script>
  // set theme before first paint to avoid a flash of the wrong theme
  (function(){
    try{
      var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
    }catch(e){
      document.documentElement.setAttribute('data-theme', 'light');
    }
  })();
</script>
<style>
  :root{
    --font-sans:-apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --bg-base:#FFFFFF;
    --glass-bg:rgba(255,255,255,0.55);
    --glass-bg-strong:rgba(255,255,255,0.75);
    --glass-border:rgba(255,255,255,0.8);
    --ink:#1E1B4B;
    --ink-soft:#4B5377;
    --ink-faint:#7C82A8;
    --accent:#4F46E5;
    --shadow:0 8px 30px rgba(79,70,229,0.10);
    --blob-1:#C7D2FE;
    --blob-2:#BAE6FD;
    --blob-3:#FDE68A;
    --blob-opacity:0.55;
  }

  html[data-theme="dark"]{
    --bg-base:#0B0E1B;
    --glass-bg:rgba(42,40,84,0.45);
    --glass-bg-strong:rgba(52,50,98,0.65);
    --glass-border:rgba(255,255,255,0.10);
    --ink:#EEF1FF;
    --ink-soft:#C2C7E8;
    --ink-faint:#8B90B8;
    --accent:#A5B4FC;
    --shadow:0 8px 30px rgba(0,0,0,0.45);
    --blob-1:#4338CA;
    --blob-2:#0E7490;
    --blob-3:#92400E;
    --blob-opacity:0.30;
  }

  html{ background:var(--bg-base); transition:background .3s ease; }

  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    min-height:100vh;
    font-family:var(--font-sans);
    color:var(--ink);
    background:var(--bg-base);
    overflow-x:hidden;
    position:relative;
  }

  h1,h2,h3{ font-family:var(--font-sans); margin:0; }

  /* ---------- ambient glass background ---------- */
  .bg-blobs{ position:fixed; inset:0; z-index:-1; overflow:hidden; }
  .blob{ position:absolute; border-radius:50%; filter:blur(70px); opacity:var(--blob-opacity); transition:background .3s ease, opacity .3s ease; }
  .b1{ width:420px; height:420px; background:var(--blob-1); top:-120px; left:-100px; animation:drift1 26s ease-in-out infinite alternate; }
  .b2{ width:380px; height:380px; background:var(--blob-2); bottom:-140px; right:-90px; animation:drift2 30s ease-in-out infinite alternate; }
  .b3{ width:300px; height:300px; background:var(--blob-3); top:40%; left:55%; animation:drift3 22s ease-in-out infinite alternate; }
  @keyframes drift1{ from{ transform:translate(0,0); } to{ transform:translate(60px,40px); } }
  @keyframes drift2{ from{ transform:translate(0,0); } to{ transform:translate(-50px,-30px); } }
  @keyframes drift3{ from{ transform:translate(0,0) scale(1); } to{ transform:translate(-40px,30px) scale(1.1); } }

  /* ---------- layout shell ---------- */
  .page{ max-width:1180px; margin:0 auto; padding:28px 20px 60px; }

  /* ---------- header / glass topbar ---------- */
  header.topbar{
    background:var(--glass-bg);
    border:1px solid var(--glass-border);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    border-radius:22px;
    box-shadow:var(--shadow);
    padding:20px 24px;
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    position:sticky;
    top:14px;
    z-index:10;
  }
  .brand h1{ font-size:1.35rem; font-weight:600; color:var(--ink); letter-spacing:-0.01em; }
  .brand .tagline{ margin:4px 0 0; font-size:0.85rem; color:var(--ink-soft); }

  .search-row{
    margin:0 4px 0;
    max-height:0;
    overflow:hidden;
    opacity:0;
    display:flex;
    justify-content:center;
    transition:max-height .25s ease, opacity .2s ease, margin .25s ease;
  }
  .search-row.open{
    max-height:90px;
    opacity:1;
    margin:16px 4px 12px;
  }
  .search-wrap{
    flex:1 1 auto;
    width:100%;
    max-width:480px;
    position:relative;
    display:flex;
    align-items:center;
  }
  .search-wrap svg{ position:absolute; left:14px; width:16px; height:16px; color:var(--ink-faint); pointer-events:none; }
  #searchInput{
    width:100%;
    padding:13px 14px 13px 38px;
    border-radius:14px;
    border:1px solid rgba(79,70,229,0.18);
    background:var(--glass-bg-strong);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    font-family:var(--font-sans);
    font-size:0.95rem;
    color:var(--ink);
    outline:none;
    box-shadow:var(--shadow);
    transition:box-shadow .2s ease, border-color .2s ease;
  }
  #searchInput::placeholder{ color:var(--ink-faint); }
  #searchInput:focus{
    border-color:var(--accent);
    box-shadow:0 0 0 3px rgba(79,70,229,0.18);
  }

  .meta-row{ display:flex; align-items:center; gap:10px; }
  .updated{ font-size:0.78rem; color:var(--ink-faint); }
  .refresh-btn, .icon-btn{
    border:1px solid rgba(79,70,229,0.25);
    background:var(--glass-bg-strong);
    color:var(--accent);
    font-family:var(--font-sans);
    font-size:0.82rem;
    font-weight:600;
    padding:8px 14px;
    border-radius:12px;
    cursor:pointer;
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .icon-btn{ padding:8px; width:36px; height:36px; display:flex; align-items:center; justify-content:center; }
  .icon-btn svg{ width:18px; height:18px; }
  .theme-toggle .ui-icon-moon{ display:block; }
  .theme-toggle .ui-icon-sun{ display:none; }
  html[data-theme="dark"] .theme-toggle .ui-icon-moon{ display:none; }
  html[data-theme="dark"] .theme-toggle .ui-icon-sun{ display:block; }

  .donate-btn{
    display:inline-flex;
    align-items:center;
    gap:6px;
    border:1px solid rgba(244,63,94,0.30);
    background:var(--glass-bg-strong);
    color:#E11D48;
    font-family:var(--font-sans);
    font-size:0.82rem;
    font-weight:600;
    padding:8px 14px;
    border-radius:12px;
    text-decoration:none;
    cursor:pointer;
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .donate-btn svg{ width:14px; height:14px; flex:0 0 auto; }
  .donate-btn:hover{ box-shadow:0 0 0 3px rgba(244,63,94,0.16); }

  .refresh-btn:hover, .icon-btn:hover{ box-shadow:0 0 0 3px rgba(79,70,229,0.14); }
  .refresh-btn:active, .icon-btn:active, .donate-btn:active{ transform:scale(0.96); }
  .refresh-btn:focus-visible, .icon-btn:focus-visible, .donate-btn:focus-visible, #searchInput:focus-visible{
    outline:2px solid var(--accent);
    outline-offset:2px;
  }

  /* ---------- card grid ---------- */
  main{ display:block; margin-top:26px; }
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(230px, 1fr));
    gap:16px;
  }

  .card{
    position:relative;
    overflow:hidden;
    border-radius:20px;
    background:var(--glass-bg);
    border:1px solid var(--glass-border);
    backdrop-filter:blur(16px);
    -webkit-backdrop-filter:blur(16px);
    box-shadow:var(--shadow);
    padding:18px 18px 16px;
    display:flex;
    flex-direction:column;
    gap:10px;
    transition:opacity .25s ease, transform .2s ease;
  }
  .card:hover{ transform:translateY(-2px); }
  .card.is-hidden{ display:none; }

  .card-glow{
    position:absolute;
    inset:-30%;
    background:radial-gradient(circle at 70% 20%, var(--tint, rgba(148,163,184,0.18)), transparent 65%);
    z-index:0;
    pointer-events:none;
    transition:background .4s ease;
  }

  .card-top{ position:relative; z-index:1; }
  .eyebrow{
    font-size:0.66rem;
    letter-spacing:0.08em;
    font-weight:600;
    color:var(--ink-faint);
    text-transform:uppercase;
  }
  .state-name{ font-size:1.08rem; font-weight:600; color:var(--ink); line-height:1.25; margin-top:2px; }
  .city-name{ margin:2px 0 0; font-size:0.84rem; color:var(--ink-soft); }

  .card-body{
    position:relative;
    z-index:1;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  .card-icon{ width:54px; height:54px; flex:0 0 auto; }
  .card-icon svg{ width:100%; height:100%; display:block; }

  .temp-block{ text-align:right; }
  .card-temp{ font-size:1.7rem; font-weight:700; color:var(--ink); line-height:1; }
  .card-condition{ margin:2px 0 0; font-size:0.78rem; color:var(--ink-soft); }

  .pulse-dot{
    width:34px; height:10px; border-radius:6px;
    background:linear-gradient(90deg, rgba(79,70,229,0.12), rgba(79,70,229,0.28), rgba(79,70,229,0.12));
    background-size:200% 100%;
    animation:shimmer 1.4s ease-in-out infinite;
  }
  @keyframes shimmer{ 0%{ background-position:0% 0; } 100%{ background-position:200% 0; } }

  .unavailable{ font-size:0.78rem; color:#B45309; }

  /* ---------- empty state ---------- */
  .empty-state{
    text-align:center;
    color:var(--ink-soft);
    font-size:0.9rem;
    padding:40px 10px;
  }
  .hidden{ display:none; }

  /* ---------- footer ---------- */
  footer{
    margin-top:46px;
    text-align:center;
    font-size:0.78rem;
    color:var(--ink-faint);
  }

  /* ---------- weather icon animations (flat, colorful) ---------- */
  .sun-rays{ stroke:#F59E0B; stroke-width:4; stroke-linecap:round; transform-origin:32px 32px; animation:spin 14s linear infinite; }
  .sun-core{ fill:#FBBF24; animation:pulseGlow 2.6s ease-in-out infinite; }
  @keyframes spin{ from{ transform:rotate(0); } to{ transform:rotate(360deg); } }
  @keyframes pulseGlow{ 0%,100%{ filter:drop-shadow(0 0 0px #FBBF24); } 50%{ filter:drop-shadow(0 0 6px #FBBF24); } }

  .cloud-float{ animation:floatX 5s ease-in-out infinite; }
  @keyframes floatX{ 0%,100%{ transform:translateX(0); } 50%{ transform:translateX(3px); } }

  .rain-drop{ stroke:#3B82F6; stroke-width:3; stroke-linecap:round; opacity:0; animation:fall 1.1s linear infinite; }
  .rain-drop.d1{ animation-delay:0s; }
  .rain-drop.d2{ animation-delay:.3s; }
  .rain-drop.d3{ animation-delay:.6s; }
  .rain-drop.d4{ animation-delay:.45s; }
  @keyframes fall{ 0%{ transform:translateY(-5px); opacity:0; } 25%{ opacity:1; } 100%{ transform:translateY(9px); opacity:0; } }

  .flake{ fill:#7DD3FC; opacity:0; animation:flakeFall 2.6s linear infinite; }
  .flake.f1{ animation-delay:0s; }
  .flake.f2{ animation-delay:.7s; }
  .flake.f3{ animation-delay:1.4s; }
  @keyframes flakeFall{ 0%{ transform:translate(0,-4px); opacity:0; } 20%{ opacity:1; } 80%{ opacity:1; } 100%{ transform:translate(3px,12px); opacity:0; } }

  .bolt{ fill:#FDE047; animation:flash 2.2s ease-in-out infinite; }
  @keyframes flash{ 0%,40%,100%{ opacity:0.15; } 48%,58%{ opacity:1; } }

  .fog-line{ fill:#94A3B8; animation:fogPulse 3.4s ease-in-out infinite; }
  .fog-line.l2{ animation-delay:.5s; }
  .fog-line.l3{ animation-delay:1s; }
  @keyframes fogPulse{ 0%,100%{ opacity:0.45; } 50%{ opacity:0.85; } }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.01ms !important; animation-iteration-count:1 !important; }
  }

  @media (max-width:640px){
    header.topbar{ flex-direction:column; align-items:stretch; }
    .search-wrap{ max-width:none; }
    .meta-row{ justify-content:space-between; }
  }
</style>
</head>
<body>

  <div class="bg-blobs">
    <span class="blob b1"></span>
    <span class="blob b2"></span>
    <span class="blob b3"></span>
  </div>

  <div class="page">
    <header class="topbar">
      <div class="brand">
        <h1>NerdsIndia - Live India Weather</h1>
        <p class="tagline">Live conditions across every state, in one view</p>
      </div>
      <div class="meta-row">
        <span class="updated" id="updatedAt">Loading…</span>
        <button class="icon-btn" id="searchToggle" aria-label="Search" aria-expanded="false" aria-controls="searchRow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
        <!-- TODO: replace href with the real donation link -->
        <a class="donate-btn" id="donateBtn" href="https://your-donation-link-here.com" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7.5-4.6-10-9C.5 8.5 2 4.5 6 4.5c2 0 3.5 1.2 4.5 2.7C11.5 5.7 13 4.5 15 4.5c4 0 5.5 4 4 7.5-2.5 4.4-10 9-10 9z"/></svg>
          Donate
        </a>
        <button class="refresh-btn" id="refreshBtn">Refresh</button>
        <button class="icon-btn theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
          <svg class="ui-icon-moon" viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg class="ui-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/><line x1="4.6" y1="4.6" x2="6.8" y2="6.8"/><line x1="17.2" y1="17.2" x2="19.4" y2="19.4"/><line x1="4.6" y1="19.4" x2="6.8" y2="17.2"/><line x1="17.2" y1="6.8" x2="19.4" y2="4.6"/></svg>
        </button>
      </div>
    </header>

    <div class="search-row" id="searchRow">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="searchInput" type="text" placeholder="Search state or city…" autocomplete="off" />
      </div>
    </div>

    <main>
      <div class="grid" id="grid"></div>
      <p class="empty-state hidden" id="emptyState">No state or city matches “<span id="queryEcho"></span>”.</p>
    </main>

    <footer>
      <p>© NerdsIndia 2026 · Live data via Open‑Meteo</p>
    </footer>
  </div>

<script>
  // ---------- data: one representative city per state ----------
  const LOCATIONS = [
    { state:"Andhra Pradesh",     city:"Amaravati",     lat:16.5062, lon:80.6480 },
    { state:"Arunachal Pradesh",  city:"Itanagar",      lat:27.0844, lon:93.6053 },
    { state:"Assam",              city:"Guwahati",      lat:26.1445, lon:91.7362 },
    { state:"Bihar",              city:"Patna",         lat:25.5941, lon:85.1376 },
    { state:"Chhattisgarh",       city:"Raipur",        lat:21.2514, lon:81.6296 },
    { state:"Goa",                city:"Panaji",        lat:15.4909, lon:73.8278 },
    { state:"Gujarat",            city:"Gandhinagar",   lat:23.2156, lon:72.6369 },
    { state:"Haryana",            city:"Gurugram",      lat:28.4595, lon:77.0266 },
    { state:"Himachal Pradesh",   city:"Shimla",        lat:31.1048, lon:77.1734 },
    { state:"Jharkhand",          city:"Ranchi",        lat:23.3441, lon:85.3096 },
    { state:"Karnataka",          city:"Bengaluru",     lat:12.9716, lon:77.5946 },
    { state:"Kerala",             city:"Thiruvananthapuram", lat:8.5241, lon:76.9366 },
    { state:"Madhya Pradesh",     city:"Bhopal",        lat:23.2599, lon:77.4126 },
    { state:"Maharashtra",        city:"Mumbai",        lat:19.0760, lon:72.8777 },
    { state:"Manipur",            city:"Imphal",        lat:24.8170, lon:93.9368 },
    { state:"Meghalaya",          city:"Shillong",      lat:25.5788, lon:91.8933 },
    { state:"Mizoram",            city:"Aizawl",        lat:23.7271, lon:92.7176 },
    { state:"Nagaland",           city:"Kohima",        lat:25.6751, lon:94.1086 },
    { state:"Odisha",             city:"Bhubaneswar",   lat:20.2961, lon:85.8245 },
    { state:"Punjab",             city:"Chandigarh",    lat:30.7333, lon:76.7794 },
    { state:"Rajasthan",          city:"Jaipur",        lat:26.9124, lon:75.7873 },
    { state:"Sikkim",             city:"Gangtok",       lat:27.3389, lon:88.6065 },
    { state:"Tamil Nadu",         city:"Chennai",       lat:13.0827, lon:80.2707 },
    { state:"Telangana",          city:"Hyderabad",     lat:17.3850, lon:78.4867 },
    { state:"Tripura",            city:"Agartala",      lat:23.8315, lon:91.2868 },
    { state:"Uttar Pradesh",      city:"Lucknow",       lat:26.8467, lon:80.9462 },
    { state:"Uttarakhand",        city:"Dehradun",      lat:30.3165, lon:78.0322 },
    { state:"West Bengal",        city:"Kolkata",       lat:22.5726, lon:88.3639 },
    { state:"Delhi (NCT)",        city:"New Delhi",     lat:28.6139, lon:77.2090 }
  ];

  const grid = document.getElementById('grid');
  const searchInput = document.getElementById('searchInput');
  const emptyState = document.getElementById('emptyState');
  const queryEcho = document.getElementById('queryEcho');
  const updatedAt = document.getElementById('updatedAt');
  const refreshBtn = document.getElementById('refreshBtn');
  const themeToggle = document.getElementById('themeToggle');
  const searchToggle = document.getElementById('searchToggle');
  const searchRow = document.getElementById('searchRow');

  // ---------- search panel: collapsed by default, opens from the header icon ----------
  function closeSearch(){
    searchRow.classList.remove('open');
    searchToggle.setAttribute('aria-expanded', 'false');
    if(searchInput.value){
      searchInput.value = '';
      searchInput.dispatchEvent(new Event('input'));
    }
  }
  searchToggle.addEventListener('click', () => {
    const willOpen = !searchRow.classList.contains('open');
    searchRow.classList.toggle('open', willOpen);
    searchToggle.setAttribute('aria-expanded', String(willOpen));
    if(willOpen){
      setTimeout(() => searchInput.focus(), 150);
    }else{
      closeSearch();
    }
  });
  document.addEventListener('keydown', (e) => {
    if(e.key === 'Escape' && searchRow.classList.contains('open')) closeSearch();
  });

  // ---------- theme: auto from system, override via button ----------
  const root = document.documentElement;
  let userOverride = false;
  const colorSchemeQuery = window.matchMedia('(prefers-color-scheme: dark)');
  colorSchemeQuery.addEventListener('change', (e) => {
    if(!userOverride) root.setAttribute('data-theme', e.matches ? 'dark' : 'light');
  });
  themeToggle.addEventListener('click', () => {
    userOverride = true;
    const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    root.setAttribute('data-theme', next);
  });

  // ---------- weather code -> icon type + label ----------
  function classify(code){
    if(code === 0) return { type:'sun',   label:'Clear sky' };
    if(code === 1) return { type:'sun',   label:'Mostly clear' };
    if(code === 2) return { type:'cloud', label:'Partly cloudy' };
    if(code === 3) return { type:'cloud', label:'Overcast' };
    if(code === 45 || code === 48) return { type:'fog', label:'Foggy' };
    if([51,53,55,56,57].includes(code)) return { type:'rain', label:'Drizzle' };
    if([61,63,65,66,67].includes(code)) return { type:'rain', label:'Rain' };
    if([80,81,82].includes(code)) return { type:'rain', label:'Rain showers' };
    if([71,73,75,77].includes(code)) return { type:'snow', label:'Snow' };
    if([85,86].includes(code)) return { type:'snow', label:'Snow showers' };
    if([95,96,99].includes(code)) return { type:'storm', label:'Thunderstorm' };
    return { type:'sun', label:'Clear' };
  }

  function tempTint(t){
    if(t == null) return 'rgba(148,163,184,0.18)';
    if(t < 15) return 'rgba(56,189,248,0.26)';
    if(t < 25) return 'rgba(99,102,241,0.18)';
    if(t < 32) return 'rgba(251,191,36,0.24)';
    return 'rgba(248,113,113,0.28)';
  }

  function iconSVG(type){
    switch(type){
      case 'sun': return `
        <svg viewBox="0 0 64 64">
          <g class="sun-rays">
            <line x1="32" y1="4" x2="32" y2="13"/><line x1="32" y1="51" x2="32" y2="60"/>
            <line x1="4" y1="32" x2="13" y2="32"/><line x1="51" y1="32" x2="60" y2="32"/>
            <line x1="12" y1="12" x2="18.5" y2="18.5"/><line x1="45.5" y1="45.5" x2="52" y2="52"/>
            <line x1="12" y1="52" x2="18.5" y2="45.5"/><line x1="45.5" y1="18.5" x2="52" y2="12"/>
          </g>
          <circle class="sun-core" cx="32" cy="32" r="13"/>
        </svg>`;
      case 'cloud': return `
        <svg viewBox="0 0 64 64">
          <g class="cloud-float">
            <ellipse cx="25" cy="34" rx="15" ry="11" fill="#CBD5E1"/>
            <ellipse cx="40" cy="30" rx="12" ry="10" fill="#E2E8F0"/>
            <ellipse cx="33" cy="39" rx="19" ry="9" fill="#F1F5F9"/>
          </g>
        </svg>`;
      case 'rain': return `
        <svg viewBox="0 0 64 64">
          <g class="cloud-float">
            <ellipse cx="25" cy="26" rx="14" ry="10" fill="#94A3B8"/>
            <ellipse cx="39" cy="23" rx="11" ry="9" fill="#CBD5E1"/>
            <ellipse cx="33" cy="31" rx="18" ry="8" fill="#E2E8F0"/>
          </g>
          <line class="rain-drop d1" x1="20" y1="42" x2="17" y2="52"/>
          <line class="rain-drop d2" x1="31" y1="44" x2="28" y2="56"/>
          <line class="rain-drop d3" x1="42" y1="42" x2="39" y2="52"/>
          <line class="rain-drop d4" x1="26" y1="46" x2="23" y2="54"/>
        </svg>`;
      case 'snow': return `
        <svg viewBox="0 0 64 64">
          <g class="cloud-float">
            <ellipse cx="25" cy="26" rx="14" ry="10" fill="#CBD5E1"/>
            <ellipse cx="39" cy="23" rx="11" ry="9" fill="#E2E8F0"/>
            <ellipse cx="33" cy="31" rx="18" ry="8" fill="#F1F5F9"/>
          </g>
          <circle class="flake f1" cx="20" cy="46" r="2.4"/>
          <circle class="flake f2" cx="32" cy="50" r="2.4"/>
          <circle class="flake f3" cx="44" cy="46" r="2.4"/>
        </svg>`;
      case 'storm': return `
        <svg viewBox="0 0 64 64">
          <g class="cloud-float">
            <ellipse cx="25" cy="24" rx="14" ry="10" fill="#64748B"/>
            <ellipse cx="39" cy="21" rx="11" ry="9" fill="#7C8AA5"/>
            <ellipse cx="33" cy="29" rx="18" ry="8" fill="#94A3B8"/>
          </g>
          <polygon class="bolt" points="34,32 25,48 32,48 28,60 42,40 34,40"/>
        </svg>`;
      case 'fog': return `
        <svg viewBox="0 0 64 64">
          <rect class="fog-line l1" x="10" y="24" width="44" height="6" rx="3"/>
          <rect class="fog-line l2" x="6" y="34" width="52" height="6" rx="3"/>
          <rect class="fog-line l3" x="14" y="44" width="36" height="6" rx="3"/>
        </svg>`;
      default: return '';
    }
  }

  // ---------- build card skeletons immediately (no network wait for static data) ----------
  function buildCards(){
    grid.innerHTML = '';
    LOCATIONS.forEach((loc, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.index = i;
      card.dataset.search = (loc.state + ' ' + loc.city).toLowerCase();
      card.innerHTML = `
        <div class="card-glow" id="glow-${i}"></div>
        <div class="card-top">
          <span class="eyebrow">State</span>
          <h3 class="state-name">${loc.state}</h3>
          <p class="city-name">${loc.city}</p>
        </div>
        <div class="card-body">
          <div class="card-icon" id="icon-${i}"><div class="pulse-dot"></div></div>
          <div class="temp-block" id="temp-${i}">
            <div class="pulse-dot"></div>
          </div>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  function renderResult(i, currentWeather){
    const loc = LOCATIONS[i];
    const iconEl = document.getElementById(`icon-${i}`);
    const tempEl = document.getElementById(`temp-${i}`);
    const glowEl = document.getElementById(`glow-${i}`);

    if(!currentWeather){
      iconEl.innerHTML = '';
      tempEl.innerHTML = `<p class="unavailable">Data unavailable</p>`;
      return;
    }
    const { type, label } = classify(currentWeather.weathercode);
    const temp = Math.round(currentWeather.temperature);

    iconEl.innerHTML = iconSVG(type);
    tempEl.innerHTML = `
      <div class="card-temp">${temp}°C</div>
      <p class="card-condition">${label}</p>
    `;
    glowEl.style.setProperty('--tint', tempTint(temp));
  }

  function formatUpdated(isoTime){
    if(!isoTime) return '';
    const timePart = isoTime.split('T')[1] || '';
    let [h, m] = timePart.split(':').map(Number);
    const suffix = h >= 12 ? 'PM' : 'AM';
    h = h % 12; if(h === 0) h = 12;
    return `Updated ${h}:${String(m).padStart(2,'0')} ${suffix} IST`;
  }

  async function loadWeather(){
    updatedAt.textContent = 'Fetching latest readings…';
    refreshBtn.disabled = true;

    const latStr = LOCATIONS.map(l => l.lat).join(',');
    const lonStr = LOCATIONS.map(l => l.lon).join(',');
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${latStr}&longitude=${lonStr}&current_weather=true&timezone=Asia%2FKolkata`;

    try{
      const res = await fetch(url);
      if(!res.ok) throw new Error('Network response was not ok');
      const data = await res.json();
      const list = Array.isArray(data) ? data : [data];

      list.forEach((entry, i) => {
        renderResult(i, entry && entry.current_weather ? entry.current_weather : null);
      });

      const firstTime = list[0] && list[0].current_weather ? list[0].current_weather.time : null;
      updatedAt.textContent = formatUpdated(firstTime) || 'Updated just now';
    }catch(err){
      LOCATIONS.forEach((_, i) => renderResult(i, null));
      updatedAt.textContent = 'Could not load live data — tap Refresh to retry';
    }finally{
      refreshBtn.disabled = false;
    }
  }

  // ---------- search filter ----------
  searchInput.addEventListener('input', () => {
    const q = searchInput.value.trim().toLowerCase();
    const cards = grid.querySelectorAll('.card');
    let visibleCount = 0;
    cards.forEach(card => {
      const match = card.dataset.search.includes(q);
      card.classList.toggle('is-hidden', !match);
      if(match) visibleCount++;
    });
    emptyState.classList.toggle('hidden', visibleCount !== 0 || q === '');
    queryEcho.textContent = searchInput.value.trim();
  });

  refreshBtn.addEventListener('click', loadWeather);

  buildCards();
  loadWeather();
</script>
</body>
</html>
