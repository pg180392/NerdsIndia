<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Goa Weather — NerdsIndia</title>
<script>
  // set theme before first paint to avoid a flash of the wrong theme
  (function(){
    try{
      var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
    }catch(e){
      document.documentElement.setAttribute('data-theme', 'light');
    }
  })();
</script>
<link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="bg-blobs">
    <span class="blob b1"></span>
    <span class="blob b2"></span>
    <span class="blob b3"></span>
  </div>

  <div class="page">
    <div id="headerMount"></div>

    <main>
      <div class="breadcrumb">
        <a href="index.html">&larr; All states</a>
      </div>
      <div class="page-heading">
        <h2>Goa</h2>
        <p>Live conditions across 10 cities and towns</p>
      </div>

      <div class="grid" id="grid"></div>
      <p class="empty-state hidden" id="emptyState">No city matches “<span id="queryEcho"></span>”.</p>
    </main>

    <footer>
      <p>© NerdsIndia 2026</p>
    </footer>
  </div>

<script src="weather-common.js"></script>
<script>
  // ---------- data: cities/towns within Goa ----------
  const CITIES = [
    { state:"Goa", city:"Panaji",        lat:15.4909, lon:73.8278 },
    { state:"Goa", city:"Margao",        lat:15.2832, lon:73.9862 },
    { state:"Goa", city:"Vasco da Gama", lat:15.3955, lon:73.8157 },
    { state:"Goa", city:"Mapusa",        lat:15.5937, lon:73.8142 },
    { state:"Goa", city:"Ponda",         lat:15.4027, lon:74.0078 },
    { state:"Goa", city:"Bicholim",      lat:15.5969, lon:73.9508 },
    { state:"Goa", city:"Curchorem",     lat:15.2667, lon:74.1167 },
    { state:"Goa", city:"Sanguem",       lat:15.2167, lon:74.1500 },
    { state:"Goa", city:"Canacona",      lat:14.9833, lon:74.0500 },
    { state:"Goa", city:"Pernem",        lat:15.7167, lon:73.8000 }
  ];

  const grid = document.getElementById('grid');
  const emptyState = document.getElementById('emptyState');
  const queryEcho = document.getElementById('queryEcho');

  (async function(){
    const { searchInput, refreshBtn, updatedAt } = await niInitHeader(
      () => niLoadWeather(CITIES, updatedAt, refreshBtn)
    );
    niWireSearch(grid, emptyState, queryEcho, searchInput);
    niBuildCards(grid, CITIES, { mode:'city' });
    niLoadWeather(CITIES, updatedAt, refreshBtn);
  })();
</script>
</body>
</html>
